<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiny Chat</title>
  <link rel="stylesheet" href="css/tiny-chat.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: transparent; }
    body { display: flex; align-items: center; justify-content: center; padding: 0; background: transparent; overflow: hidden; }
  </style>
</head>
<body>
  <div id="tiny-chat-root"></div>

  <script>
    // 内联 TinyChat 类（独立预览用，插件模式走 index.js + ES Module）
    class TinyChat {
      constructor(rootEl, options = {}) {
        this.root = typeof rootEl === 'string' ? document.querySelector(rootEl) : rootEl;
        this.opponentName = options.opponentName || '赫敏·格兰杰';
        this.playerName = options.playerName || '你';
        this.onPlayerSend = options.onPlayerSend || null;
        this.messagesEl = null;
        this.speechInput = null;
        this.sendBtn = null;
        this._init();
      }

      _init() {
        this.root.innerHTML = `
          <div class="chat-panel">
            <div class="paper-panel">
              <div class="chat-title">Owl Post</div>
              <div class="messages"></div>
              <div class="controls">
                <div class="pencil-row">
                  <div class="pencil-input-slot">
                    <div class="pencil-input" contenteditable="true" spellcheck="false" data-placeholder="提起羽毛笔…"></div>
                  </div>
                  <button class="stamp-btn" type="button" aria-label="发送"></button>
                </div>
              </div>
            </div>
          </div>

          <div class="modal-mask">
            <div class="modal-card" role="dialog" aria-modal="true" aria-label="Floo Network">
              <div class="modal-head">
                <div class="modal-title">Floo Network</div>
                <button class="modal-close" type="button" aria-label="关闭">关闭</button>
              </div>
              <button class="modal-page-arrow modal-page-arrow--prev" type="button" aria-label="上一页"></button>
              <button class="modal-page-arrow modal-page-arrow--next" type="button" aria-label="下一页"></button>
              <div class="network-panels">
                <!-- === Page 1: API Config === -->
                <section class="network-panel network-panel--left network-page network-page--1">
                  <div class="api-top-bar">
                    <label class="api-label api-title-label">API配置</label>
                  </div>
                  <div class="api-panel api-panel--page1-left">
                    <div class="api-grid">
                      <div class="field url">
                        <label class="api-label">API URL</label>
                        <input class="api-input" placeholder="https://api.openai.com/v1" />
                      </div>
                      <div class="field key">
                        <label class="api-label">API Key</label>
                        <input class="api-input" type="password" placeholder="sk-..." />
                      </div>
                      <div class="field model">
                        <label class="api-label">Models</label>
                        <input class="api-input" placeholder="gpt-4o-mini" />
                        <div class="model-list" hidden></div>
                      </div>
                      <div class="field stream">
                        <label class="api-label">Stream</label>
                        <input class="api-input" placeholder="" readonly />
                        <div class="stream-list" hidden>
                          <button class="stream-item" type="button" data-value="realtime">实时传输</button>
                          <button class="stream-item" type="button" data-value="complete">完整传输</button>
                        </div>
                      </div>
                      </div>
                    </div>
                  </div>
                </section>
                <section class="network-panel network-panel--right network-page network-page--1">
                  <div class="api-panel">
                    <div class="api-grid">
                      <div class="thinking-chain-section">
                        <label class="api-label thinking-chain-label">思维链标签</label>
                        <div class="field thinking-chain-tag-field">
                          <input class="api-input thinking-chain-tag-input" placeholder="思维链XML标签" spellcheck="false" />
                        </div>
                      </div>
                      <div class="field names field-row">
                        <div class="field-half field-half--left char-name-field">
                          <label class="api-label">Char name</label>
                          <input class="api-input char-name-input" placeholder="角色名字" spellcheck="false" />
                        </div>
                        <div class="field-half field-half--right user-name-field">
                          <label class="api-label">User name</label>
                          <input class="api-input user-name-input" placeholder="我的名字" spellcheck="false" />
                        </div>
                      </div>
                      <div class="field deepseek field-row">
                        <div class="field-half field-half--left">
                          <label class="api-label">DeepSeek</label>
                          <input class="api-input deepseek-thinking-input" placeholder="" readonly />
                          <div class="deepseek-list" hidden>
                            <button class="deepseek-item" type="button" data-value="enabled">启用</button>
                            <button class="deepseek-item" type="button" data-value="disabled">禁用</button>
                          </div>
                        </div>
                        <div class="field-half field-half--right">
                          <label class="api-label deepseek-effort-label">Reasoning effort</label>
                          <input class="api-input deepseek-effort-input" placeholder="" readonly />
                          <div class="deepseek-effort-list" hidden>
                            <button class="deepseek-effort-item" type="button" data-value="high">high</button>
                            <button class="deepseek-effort-item" type="button" data-value="max">max</button>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </section>

                <!-- === Page 2: Preset === -->
                <section class="network-panel network-panel--left network-page network-page--2" style="display:none">
                  <div class="preset-panel">
                    <div class="preset-top-bar">
                      <label class="api-label preset-title-label">预设</label>
                      <button class="preset-add-btn" type="button">+</button>
                    </div>
                    <div class="preset-block-list"></div>
                    <div class="preset-actions">
                      <button class="preset-action-btn" type="button" data-action="import">导入</button>
                      <button class="preset-action-btn" type="button" data-action="export">导出</button>
                      <button class="preset-action-btn" type="button" data-action="preview">预览</button>
                    </div>
                  </div>
                </section>
                <section class="network-panel network-panel--right network-page network-page--2" style="display:none">
                  <div class="api-panel preset-editor" hidden>
                    <div class="preset-editor-toolbar">
                      <button class="preset-toolbar-btn" type="button" data-action="save">保存</button>
                      <button class="preset-toolbar-btn" type="button" data-action="back">返回</button>
                      <button class="preset-toolbar-btn preset-subchat-reset" type="button" hidden>重置</button>
                    </div>
                    <div class="api-grid">
                      <div class="field field-row preset-field-type-role">
                        <div class="field-half field-half--left preset-field-type">
                          <label class="api-label">Type</label>
                          <input class="api-input preset-type-input" placeholder="" readonly />
                          <div class="preset-type-list" hidden>
                            <button class="preset-type-item" type="button" data-value="message">消息块</button>
                            <button class="preset-type-item" type="button" data-value="context">主聊天</button>
                            <button class="preset-type-item" type="button" data-value="subchat">副聊天</button>
                            <button class="preset-type-item" type="button" data-value="current_input">当前用户输入</button>
                            <button class="preset-type-item" type="button" data-value="worldinfo">世界书</button>
                          </div>
                        </div>
                        <div class="field-half field-half--right preset-field-role">
                          <div class="preset-role-control">
                            <label class="api-label">Role</label>
                            <input class="api-input preset-role-input" placeholder="" readonly />
                            <div class="preset-role-list" hidden>
                              <button class="preset-role-item" type="button" data-value="system">system</button>
                              <button class="preset-role-item" type="button" data-value="user">user</button>
                              <button class="preset-role-item" type="button" data-value="assistant">assistant</button>
                            </div>
                          </div>
                          <div class="preset-subchat-control" hidden>
                            <div class="preset-subchat-head">
                              <label class="api-label preset-subchat-range-label">聊天历史发送范围</label>
                            </div>
                            <input class="api-input preset-subchat-range-input" type="number" min="0" max="999" step="1" placeholder="空=全发" />
                          </div>
                        </div>
                      </div>
                      <div class="field preset-field-name">
                        <label class="api-label">Name</label>
                        <input class="api-input preset-name-input" placeholder="块名称" />
                      </div>
                      <div class="field preset-field-text">
                        <textarea class="api-input preset-text-input" placeholder="内容"></textarea>
                        <div class="preset-worldinfo-box" hidden>
                          <div class="preset-worldinfo-list"></div>
                        </div>
                      </div>
                    </div>
                  </div>
                  <div class="preset-preview" hidden>
                    <div class="preset-preview-toolbar">
                      <button class="preset-toolbar-btn preset-preview-toggle" type="button" data-mode="readable">原始JSON</button>
                      <button class="preset-toolbar-btn" type="button" data-action="preview-back">返回</button>
                    </div>
                    <div class="preset-preview-list"></div>
                  </div>
                </section>
                <!-- === Page 3: Main Chat === -->
                <section class="network-panel network-panel--left network-page network-page--3" style="display:none">
                  <div class="mainchat-top-bar">
                    <label class="api-label mainchat-title-label">主聊天</label>
                    <button class="preset-action-btn mainchat-refresh-btn" type="button">刷新</button>
                  </div>
                  <div class="mainchat-panel">
                    <div class="api-grid">
                      <div class="field mainchat-field-ai">
                        <label class="api-label">最近AI消息范围</label>
                        <input class="api-input mainchat-ai-n" type="number" min="0" max="99" step="1" placeholder="空=全部，0=不读取" />
                      </div>
                      <div class="field mainchat-field-user">
                        <label class="api-label">最近用户消息范围</label>
                        <input class="api-input mainchat-user-n" type="number" min="0" max="99" step="1" placeholder="空=全部，0=不发送" />
                      </div>
                    </div>
                    <div class="mainchat-xml-section">
                      <div class="mainchat-xml-head">
                        <label class="api-label">XML规则</label>
                        <button class="preset-action-btn mainchat-add-rule" type="button">+</button>
                      </div>
                      <div class="mainchat-xml-rules"></div>
                    </div>
                  </div>
                </section>
                <section class="network-panel network-panel--right network-page network-page--3" style="display:none">
                  <div class="mainchat-preview">
                    <pre class="mainchat-preview-text">点击刷新查看上下文</pre>
                  </div>
                </section>
                <!-- === Page 4: World Book === -->
                <section class="network-panel network-panel--left network-page network-page--4" style="display:none">
                  <div class="wb-top-bar">
                    <label class="api-label wb-title-label">世界书</label>
                    <button class="preset-action-btn wb-add-btn" type="button">+</button>
                  </div>
                  <div class="wb-panel">
                    <div class="wb-card-list"></div>
                  </div>
                </section>
                <section class="network-panel network-panel--right network-page network-page--4" style="display:none">
                  <div class="wb-picker" hidden>
                    <div class="wb-picker-list"></div>
                  </div>
                  <div class="wb-triggered-preview" hidden>
                    <div class="wb-triggered-preview-toolbar">
                      <button class="preset-toolbar-btn wb-triggered-preview-back" type="button">返回</button>
                    </div>
                    <div class="wb-triggered-preview-box">
                      <pre class="mainchat-preview-text wb-triggered-preview-text">点击预览查看触发结果</pre>
                    </div>
                  </div>
                </section>
              </div>
            </div>
          </div>
        `;
        this.messagesEl = this.root.querySelector('.messages');
        this.speechInput = this.root.querySelector('.pencil-input');
        this.sendBtn = this.root.querySelector('.stamp-btn');
        this._pendingDeleteMessageId = '';
        this.modalMask = this.root.querySelector('.modal-mask');
        this.modalCloseBtn = this.root.querySelector('.modal-close');
        this.chatTitle = this.root.querySelector('.chat-title');
        this.apiUrlInput = this.root.querySelector('.field.url .api-input');
        this.apiKeyInput = this.root.querySelector('.field.key .api-input');
        this.apiModelInput = this.root.querySelector('.field.model .api-input');
        this.modelListEl = this.root.querySelector('.model-list');
        this.flooChannelLabel = this.root.querySelector('.field.url .api-label');
        this.flooPowderLabel = this.root.querySelector('.field.key .api-label');
        this.destinationLabel = this.root.querySelector('.field.model .api-label');
        this.streamLabel = this.root.querySelector('.field.stream .api-label');
        this.streamInput = this.root.querySelector('.field.stream .api-input');
        this.streamListEl = this.root.querySelector('.stream-list');
        this.deepseekLabel = this.root.querySelector('.field.deepseek .field-half--left .api-label');
        this.deepseekInput = this.root.querySelector('.deepseek-thinking-input');
        this.deepseekListEl = this.root.querySelector('.deepseek-list');
        this.deepseekEffortLabel = this.root.querySelector('.deepseek-effort-label');
        this.deepseekEffortInput = this.root.querySelector('.deepseek-effort-input');
        this.deepseekEffortListEl = this.root.querySelector('.deepseek-effort-list');
        this.thinkingChainLabel = this.root.querySelector('.thinking-chain-label');
        this.thinkingChainTagInput = this.root.querySelector('.thinking-chain-tag-input');
        this.charNameInput = this.root.querySelector('.char-name-input');
        this.userNameInput = this.root.querySelector('.user-name-input');

        // Page navigation
        this._currentPage = 1;
        this._prevPageBtn = this.root.querySelector('.modal-page-arrow--prev');
        this._nextPageBtn = this.root.querySelector('.modal-page-arrow--next');
        this._allPages = this.root.querySelectorAll('.network-page');

        // Preset refs
        this._presetBlockList = this.root.querySelector('.preset-block-list');
        this._presetEditor = this.root.querySelector('.preset-editor');
        this._presetTypeInput = this.root.querySelector('.preset-field-type .api-input');
        this._presetTypeList = this.root.querySelector('.preset-type-list');
        this._presetRoleInput = this.root.querySelector('.preset-role-input');
        this._presetRoleList = this.root.querySelector('.preset-role-list');
        this._presetRoleControl = this.root.querySelector('.preset-role-control');
        this._presetSubchatControl = this.root.querySelector('.preset-subchat-control');
        this._presetSubchatRangeInput = this.root.querySelector('.preset-subchat-range-input');
        this._presetSubchatReset = this.root.querySelector('.preset-subchat-reset');
        this._presetNameInput = this.root.querySelector('.preset-field-name .api-input');
        this._presetTextInput = this.root.querySelector('.preset-field-text .api-input');
        this._presetWorldinfoBox = this.root.querySelector('.preset-worldinfo-box');
        this._presetWorldinfoList = this.root.querySelector('.preset-worldinfo-list');
        this._presetAddBtn = this.root.querySelector('.preset-add-btn');

        // Preview refs
        this._presetPreview = this.root.querySelector('.preset-preview');
        this._presetPreviewList = this.root.querySelector('.preset-preview-list');

        // Main Chat refs
        this._mainchatAiN = this.root.querySelector('.mainchat-ai-n');
        this._mainchatUserN = this.root.querySelector('.mainchat-user-n');
        this._mainchatRulesEl = this.root.querySelector('.mainchat-xml-rules');
        this._mainchatAddRule = this.root.querySelector('.mainchat-add-rule');
        this._mainchatRefreshBtn = this.root.querySelector('.mainchat-refresh-btn');
        this._mainchatPreviewText = this.root.querySelector('.mainchat-preview-text');

        // World Book refs
        this._wbCardList = this.root.querySelector('.wb-card-list');
        this._wbAddBtn = this.root.querySelector('.wb-add-btn');
        this._wbPicker = this.root.querySelector('.wb-picker');
        this._wbPickerList = this.root.querySelector('.wb-picker-list');
        this._wbTriggeredPreview = this.root.querySelector('.wb-triggered-preview');
        this._wbTriggeredPreviewText = this.root.querySelector('.wb-triggered-preview-text');
        this._wbTriggeredPreviewBack = this.root.querySelector('.wb-triggered-preview-back');

        // Preset state
        this._presetBlocks = [];
        this._selectedBlockIndex = -1;
        this._hoveredPresetBlockId = '';

        // Main Chat state
        this._mainChatConfig = { contextN: '', userN: '', xmlRules: [] };

        // World Book state
        this._worldBooks = [];

        // API state
        this._apiConfig = { url: '', key: '', model: '', models: [], stream: false, streamMode: '', deepseekThinking: '', deepseekEffort: '', thinkingChainEnabled: false, thinkingChainTag: '' };
        this._cachedModels = [];
        this._messageSeq = 0;
        this._chatHistory = [];
        this._dbReady = this._openDB();
        this._restoreApiConfig();

        this.sendBtn.addEventListener('click', () => this._onSend());
        this.speechInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); this._onSend(); }
        });

        // Owl Post title opens modal
        this.chatTitle.addEventListener('click', () => this.openModal());

        // Close modal
        this.modalCloseBtn.addEventListener('click', () => this.closeModal());
        this.modalMask.addEventListener('click', (e) => {
          if (e.target === this.modalMask) this.closeModal();
        });

        // Floo Channel label: normalize URL
        this.flooChannelLabel.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const before = this.apiUrlInput.value.trim();
          const normalized = before.replace(/\/+$/, '');
          if (!normalized) return;
          if (normalized !== before) this.apiUrlInput.value = normalized;
          this._setLabelState(this.flooChannelLabel, 'emerald');
          this._saveApiConfig();
        });
        this.apiUrlInput.addEventListener('input', () => {
          this._setLabelState(this.flooChannelLabel, null);
          this._setLabelState(this.destinationLabel, null);
          this._cachedModels = [];
          this._hideModelList();
          this._saveApiConfig();
        });

        // Floo Powder label: toggle password visibility
        this.flooPowderLabel.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          if (this.flooPowderLabel.classList.contains('is-emerald')) {
            this._setLabelState(this.flooPowderLabel, null);
            this.apiKeyInput.type = 'password';
          } else {
            this.apiKeyInput.type = this.apiKeyInput.type === 'password' ? 'text' : 'password';
            this._setLabelState(this.flooPowderLabel, 'emerald');
          }
        });
        this.apiKeyInput.addEventListener('input', () => {
          this._setLabelState(this.flooPowderLabel, null);
          this._setLabelState(this.destinationLabel, null);
          this._cachedModels = [];
          this._hideModelList();
          this._saveApiConfig();
        });

        this.thinkingChainTagInput.addEventListener('input', () => {
          this._apiConfig.thinkingChainTag = this._normalizeThinkingTagName(this.thinkingChainTagInput.value);
          this._apiConfig.thinkingChainEnabled = !!this._apiConfig.thinkingChainTag;
          this._saveApiConfig();
        });
        this.charNameInput.addEventListener('input', () => {
          this.opponentName = String(this.charNameInput.value || '').trim() || '赫敏·格兰杰';
          this._saveApiConfig();
        });
        this.userNameInput.addEventListener('input', () => {
          this.playerName = String(this.userNameInput.value || '').trim() || '你';
          this._saveApiConfig();
        });

        // Destination label: connect & toggle model list
        this.destinationLabel.addEventListener('click', async (e) => {
          e.preventDefault();
          e.stopPropagation();

          // Already connected (green): toggle model list
          if (this.destinationLabel.classList.contains('is-emerald')) {
            if (this.modelListEl.hidden) this._showModelList();
            else this._hideModelList();
            return;
          }

          // Not connected: attempt to fetch models
          this._hideModelList();
          this._cachedModels = [];
          this._setLabelState(this.destinationLabel, null);

          const url = this.apiUrlInput.value.trim().replace(/\/+$/, '');
          const key = this.apiKeyInput.value.trim();
          if (!url || !key) {
            this._setLabelState(this.destinationLabel, 'flame');
            return;
          }

          try {
            const base = url.replace(/\/chat\/completions$/i, '').replace(/\/+$/, '');
            const resp = await fetch(`${base}/models`, {
              headers: { Authorization: `Bearer ${key}` },
            });
            const raw = await resp.text();
            if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${raw.slice(0, 200)}`);
            const data = JSON.parse(raw);
            const ids = Array.isArray(data?.data)
              ? data.data.map(m => String(m?.id || '').trim()).filter(Boolean)
              : [];
            if (!ids.length) { this._setLabelState(this.destinationLabel, 'flame'); return; }

            this._cachedModels = ids;
            const prevStream = this._apiConfig.stream;
            const prevStreamMode = this._apiConfig.streamMode;
            const prevThinkingChainEnabled = this._apiConfig.thinkingChainEnabled;
            const prevThinkingChainTag = this._apiConfig.thinkingChainTag;
            this._apiConfig = {
              ...this._apiConfig,
              url,
              key,
              model: this.apiModelInput.value.trim() || ids[0],
              models: ids,
              stream: prevStream,
              streamMode: prevStreamMode,
              thinkingChainEnabled: prevThinkingChainEnabled,
              thinkingChainTag: prevThinkingChainTag,
            };
            if (!this.apiModelInput.value.trim()) this.apiModelInput.value = ids[0];
            this._renderModelList(ids);
            this._setLabelState(this.destinationLabel, 'emerald');
            this._hideModelList();
            this._saveApiConfig();
          } catch (err) {
            console.warn('[TinyChat] Fetch models failed', err);
            this._setLabelState(this.destinationLabel, 'flame');
          }
        });

        // Manual model input save
        this.apiModelInput.addEventListener('input', () => {
          this._apiConfig.model = this.apiModelInput.value.trim();
          this._saveApiConfig();
        });

        // Stream label: toggle stream on/off; input click toggles dropdown
        this.streamLabel.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const isOn = this.streamLabel.classList.contains('is-emerald');
          if (isOn) {
            this._setLabelState(this.streamLabel, null);
            this._apiConfig.stream = false;
            this._apiConfig.streamMode = '';
            this.streamInput.value = '';
            this._hideStreamList();
          } else {
            this._setLabelState(this.streamLabel, 'emerald');
            this._apiConfig.stream = true;
            if (!this._apiConfig.streamMode) {
              this._apiConfig.streamMode = 'realtime';
              this.streamInput.value = '实时传输';
            }
          }
          this._saveApiConfig();
        });
        this.streamInput.addEventListener('click', () => {
          if (this.streamListEl.hidden) this._showStreamList();
          else this._hideStreamList();
        });
        this.streamListEl.querySelectorAll('.stream-item').forEach(btn => {
          btn.addEventListener('click', () => {
            const v = btn.dataset.value;
            this._apiConfig.stream = true;
            this._apiConfig.streamMode = v;
            this.streamInput.value = btn.textContent;
            this._setLabelState(this.streamLabel, 'emerald');
            this._hideStreamList();
            this._saveApiConfig();
          });
        });

        // DeepSeek label: toggle thinking on/off; input click toggles dropdown
        this.deepseekLabel.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const isOn = this.deepseekLabel.classList.contains('is-emerald');
          if (isOn) {
            this._setLabelState(this.deepseekLabel, null);
            this._apiConfig.deepseekThinking = '';
            this._apiConfig.deepseekEffort = '';
            this.deepseekInput.value = '';
            this.deepseekEffortInput.value = '';
            this._setLabelState(this.deepseekEffortLabel, null);
            this._hideDeepseekList();
            this._hideDeepseekEffortList();
          } else {
            this._setLabelState(this.deepseekLabel, 'emerald');
            this._apiConfig.deepseekThinking = 'enabled';
            this.deepseekInput.value = '启用';
            if (!this._apiConfig.deepseekEffort) {
              this._apiConfig.deepseekEffort = 'high';
              this.deepseekEffortInput.value = 'high';
              this._setLabelState(this.deepseekEffortLabel, 'emerald');
