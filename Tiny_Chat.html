      openModal() {
        this.modalMask.classList.add('open');
        try {
          window.parent?.postMessage?.({ type: 'tinychat.modalState', open: true }, '*');
        } catch (e) {}
      }

      closeModal() {
        this.modalMask.classList.remove('open');
        try {
          window.parent?.postMessage?.({ type: 'tinychat.modalState', open: false }, '*');
        } catch (e) {}
      }

      _normalizeThinkingTagName(value) {
        return String(value == null ? '' : value)
          .trim()
          .replace(/^<\/?\s*/, '')
          .replace(/\s*\/?>$/g, '')
          .split(/\s+/)[0]
          .replace(/[^A-Za-z0-9_.:-]/g, '')
          .slice(0, 48);
      }

      _getThinkingTagName() {
        if (!this._apiConfig.thinkingChainEnabled) return '';
        return this._normalizeThinkingTagName(this._apiConfig.thinkingChainTag || this.thinkingChainTagInput?.value || '');
      }

      _escapeRegExp(value) {
        return String(value || '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      }

      _createThinkingFoldBox(tagName, content) {
        const box = document.createElement('button');
        box.type = 'button';
        box.className = 'thinking-fold-box';
        box.dataset.expanded = 'false';
        const collapsedText = 'Thought Content';
        const expandedText = `<${tagName}>\n${String(content || '').trim()}\n</${tagName}>`;
        const syncText = () => {
          box.textContent = box.dataset.expanded === 'true' ? expandedText : collapsedText;
        };
        box.addEventListener('click', (event) => {
          event.preventDefault();
          event.stopPropagation();
          box.dataset.expanded = box.dataset.expanded === 'true' ? 'false' : 'true';
          box.classList.toggle('is-expanded', box.dataset.expanded === 'true');
          syncText();
        });
        syncText();
        return box;
      }

      _appendMessageText(container, text) {
        const value = String(text || '');
        const parts = value.split('\n');
        parts.forEach((part, index) => {
          if (index > 0) container.appendChild(document.createElement('br'));
          if (part) container.appendChild(document.createTextNode(part));
        });
      }

      _appendMessageContent(container, text, { foldThinking = false } = {}) {
        const tagName = foldThinking ? this._getThinkingTagName() : '';
        const rawText = String(text == null ? '' : text);
        if (!tagName) {
          this._appendMessageText(container, rawText);
          return;
        }

        const regex = new RegExp(`<${this._escapeRegExp(tagName)}\\b[^>]*>([\\s\\S]*?)<\\/${this._escapeRegExp(tagName)}>`, 'gi');
        let lastIndex = 0;
        let matched = false;
        let match = null;
        while ((match = regex.exec(rawText)) !== null) {
          matched = true;
          this._appendMessageText(container, rawText.slice(lastIndex, match.index));
          container.appendChild(this._createThinkingFoldBox(tagName, match[1] || ''));
          lastIndex = regex.lastIndex;
        }
        if (!matched) {
          this._appendMessageText(container, rawText);
          return;
        }
        this._appendMessageText(container, rawText.slice(lastIndex));
      }

      _nextMessageId() {
        this._messageSeq += 1;
        return `msg_${Date.now()}_${this._messageSeq}`;
      }

      _deleteChatMessage(messageId) {
        const targetId = String(messageId || '').trim();
        if (!targetId) return;
        this._chatHistory = this._chatHistory.filter(message => String(message?.id || '').trim() !== targetId);
        this.messagesEl.querySelector(`.msg-row[data-message-id="${this._esc(targetId)}"]`)?.remove();
        this._pendingDeleteMessageId = '';
      }

      addMessage(type, who, text, meta = {}) {
        const messageId = String(meta?.id || '').trim() || this._nextMessageId();
        const row = document.createElement('div');
        row.className = `msg-row ${type}-row`;
        row.dataset.messageId = messageId;
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        const whoSpan = document.createElement('button');
        whoSpan.type = 'button';
        whoSpan.className = 'who';
        whoSpan.textContent = who;
        whoSpan.addEventListener('click', (event) => {
          event.preventDefault();
          event.stopPropagation();
          const activeId = this._pendingDeleteMessageId === messageId ? '' : messageId;
          this._pendingDeleteMessageId = activeId;
          this.messagesEl.querySelectorAll('.msg-row').forEach(item => {
            item.classList.toggle('delete-armed', item.dataset.messageId === activeId);
          });
        });
        div.appendChild(whoSpan);
        this._appendMessageContent(div, text, { foldThinking: type === 'ai' });

        const deleteBtn = document.createElement('button');
        deleteBtn.type = 'button';
        deleteBtn.className = 'msg-delete-btn';
        deleteBtn.setAttribute('aria-label', '删除消息');
        deleteBtn.addEventListener('click', (event) => {
          event.preventDefault();
          event.stopPropagation();
          this._deleteChatMessage(messageId);
        });

        if (type === 'player') {
          div.appendChild(deleteBtn);
        } else if (type === 'ai') {
          div.insertBefore(deleteBtn, div.firstChild);
        }

        row.appendChild(div);
        this.messagesEl.appendChild(row);
        this.messagesEl.scrollTop = this.messagesEl.scrollHeight;
        return messageId;
      }

      _restoreChatMessages() {
        this.messagesEl.innerHTML = '';
        this._pendingDeleteMessageId = '';
        const history = Array.isArray(this._chatHistory) ? this._chatHistory : [];
        history.forEach(message => {
          const role = String(message?.role || '').trim().toLowerCase();
          const content = String(message?.content || '');
          const id = String(message?.id || '').trim() || this._nextMessageId();
          if (role === 'user') {
            this.addMessage('player', this.playerName, content, { id });
          } else if (role === 'assistant') {
            this.addMessage('ai', this.opponentName, content, { id });
          } else if (role === 'system') {
            this.addMessage('system', 'System', content, { id });
          }
        });
      }

      addPencilLine(side = 'right', tight = false) {
        const row = document.createElement('div');
        row.className = `msg-row system-row ${side === 'left' ? 'left' : 'right'}${tight ? ' tight' : ''}`;
        const div = document.createElement('div');
        div.className = `msg system pencil-sep ${side === 'left' ? 'pencil-sep-left' : 'pencil-sep-right'}`;
        row.appendChild(div);
        this.messagesEl.appendChild(row);
        this.messagesEl.scrollTop = this.messagesEl.scrollHeight;
      }

      async _onSend() {
        const text = (this.speechInput.innerText || '').replace(/\u00A0/g, ' ').replace(/[\r\n]+/g, ' ').trim();
        if (!text) return;
        const userMessageId = this._nextMessageId();
        this.addMessage('player', this.playerName, text, { id: userMessageId });
        this.speechInput.textContent = '';
        this.sendBtn.classList.add('sending');
        this.sendBtn.disabled = true;

        const requestMessages = await this._buildRequestMessages(text);
        this._chatHistory.push({ id: userMessageId, role: 'user', content: text });

        try {
          const { url, key, model, stream, streamMode, deepseekThinking, deepseekEffort } = this._apiConfig;

          // If API not configured, use callback fallback
          if (!url || !key || !model) {
            if (this.onPlayerSend) {
              const replies = await this.onPlayerSend(text);
              const lines = Array.isArray(replies) ? replies : (replies ? [replies] : []);
              lines.forEach(line => {
                const aiMessageId = this._nextMessageId();
                this.addMessage('ai', this.opponentName, line, { id: aiMessageId });
                this._chatHistory.push({ id: aiMessageId, role: 'assistant', content: line });
              });
            }
          } else {
            // Real API call
            const base = url.replace(/\/chat\/completions$/i, '').replace(/\/+$/, '');
            const endpoint = `${base}/chat/completions`;
            const useStream = stream && streamMode === 'realtime';

            const body = {
              model,
              messages: requestMessages,
              stream: useStream,
            };

            // DeepSeek thinking params
            if (deepseekThinking === 'enabled') {
              body.thinking = { type: 'enabled' };
              body.reasoning_effort = deepseekEffort || 'high';
            } else if (deepseekThinking === 'disabled') {
              body.thinking = { type: 'disabled' };
            }

            const resp = await fetch(endpoint, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                Authorization: `Bearer ${key}`,
              },
              body: JSON.stringify(body),
            });

            if (!resp.ok) {
              const err = await resp.text().catch(() => '');
              throw new Error(`API ${resp.status}: ${err.slice(0, 200)}`);
            }

            if (useStream) {
              // SSE streaming
              const reader = resp.body.getReader();
              const decoder = new TextDecoder();
              let buffer = '';
              let fullText = '';
              // Create a live message element
              const aiMessageId = this._nextMessageId();
              const row = document.createElement('div');
              row.className = 'msg-row ai-row';
              row.dataset.messageId = aiMessageId;
              const div = document.createElement('div');
              div.className = 'msg ai';
              const deleteBtn = document.createElement('button');
              deleteBtn.type = 'button';
              deleteBtn.className = 'msg-delete-btn';
              deleteBtn.setAttribute('aria-label', '删除消息');
              deleteBtn.addEventListener('click', (event) => {
                event.preventDefault();
                event.stopPropagation();
                this._deleteChatMessage(aiMessageId);
              });
              const whoBtn = document.createElement('button');
              whoBtn.type = 'button';
              whoBtn.className = 'who';
              whoBtn.textContent = this.opponentName;
              whoBtn.addEventListener('click', (event) => {
                event.preventDefault();
                event.stopPropagation();
                const activeId = this._pendingDeleteMessageId === aiMessageId ? '' : aiMessageId;
                this._pendingDeleteMessageId = activeId;
                this.messagesEl.querySelectorAll('.msg-row').forEach(item => {
                  item.classList.toggle('delete-armed', item.dataset.messageId === activeId);
                });
              });
              const contentSpan = document.createElement('span');
              div.appendChild(deleteBtn);
              div.appendChild(whoBtn);
              div.appendChild(contentSpan);
              row.appendChild(div);
              this.messagesEl.appendChild(row);

              while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';
                for (const line of lines) {
                  if (!line.startsWith('data: ')) continue;
                  const payload = line.slice(6).trim();
                  if (payload === '[DONE]') break;
                  try {
                    const chunk = JSON.parse(payload);
                    const delta = chunk.choices?.[0]?.delta?.content || '';
                    fullText += delta;
                    contentSpan.textContent = fullText;
                    this.messagesEl.scrollTop = this.messagesEl.scrollHeight;
                  } catch (_) {}
                }
              }
              contentSpan.replaceChildren();
              this._appendMessageContent(contentSpan, fullText, { foldThinking: true });
              this._chatHistory.push({ id: aiMessageId, role: 'assistant', content: fullText });
            } else {
              // Non-stream or complete mode
              const data = await resp.json();
              const reply = data.choices?.[0]?.message?.content || '';
              const aiMessageId = this._nextMessageId();
              this.addMessage('ai', this.opponentName, reply, { id: aiMessageId });
              this._chatHistory.push({ id: aiMessageId, role: 'assistant', content: reply });
            }
          }
        } catch (err) {
          console.error('[TinyChat] Send failed', err);
          this.addMessage('ai', 'System', `✘ ${err.message}`);
        } finally {
          this.sendBtn.classList.remove('sending');
          this.sendBtn.disabled = false;
        }
        this.speechInput.focus();
      }

      _esc(s) {
        return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#39;");
      }

      // --- API Connection ---

      _setLabelState(labelEl, state) {
        labelEl.classList.remove('is-emerald', 'is-flame');
        if (state === 'emerald') labelEl.classList.add('is-emerald');
        if (state === 'flame') labelEl.classList.add('is-flame');
      }

      _renderModelList(models) {
        this.modelListEl.innerHTML = models.map(m =>
          `<button class="model-item" type="button">${this._esc(m)}</button>`
        ).join('');
        this.modelListEl.querySelectorAll('.model-item').forEach(btn => {
          btn.addEventListener('click', () => {
            this.apiModelInput.value = btn.textContent;
            this._apiConfig.model = btn.textContent;
            this._hideModelList();
            this._saveApiConfig();
          });
        });
      }

      _showModelList() {
        if (this._cachedModels.length) this.modelListEl.hidden = false;
      }

      _hideModelList() {
        this.modelListEl.hidden = true;
      }

      _showStreamList() {
        this.streamListEl.hidden = false;
      }

      _hideStreamList() {
        this.streamListEl.hidden = true;
      }

      _showDeepseekList() {
        this.deepseekListEl.hidden = false;
      }

      _hideDeepseekList() {
        this.deepseekListEl.hidden = true;
      }

      _showDeepseekEffortList() {
        this.deepseekEffortListEl.hidden = false;
      }

      _hideDeepseekEffortList() {
        this.deepseekEffortListEl.hidden = true;
      }

      getApiConfig() {
        return { ...this._apiConfig };
      }

      // --- Page Navigation ---

      _goPage(n) {
        const maxPage = 4;
        if (n < 1 || n > maxPage) return;
        this._currentPage = n;
        this._allPages.forEach(el => {
          const pageNum = el.classList.contains('network-page--1') ? 1
            : el.classList.contains('network-page--2') ? 2
            : el.classList.contains('network-page--3') ? 3 : 4;
          el.style.display = pageNum === n ? '' : 'none';
        });
        this._updatePageArrows();
      }

      _updatePageArrows() {
        this._prevPageBtn.disabled = this._currentPage <= 1;
        this._nextPageBtn.disabled = this._currentPage >= 4;
      }

      _hideAllPresetDropdowns() {
        this._presetTypeList.hidden = true;
        this._presetRoleList.hidden = true;
        this._toggleFieldsBelow('preset-field-type-role', false);
      }

      _restorePresetEditorState() {
        if (this._currentPage !== 2) return;
        if (!this._blockDraft || this._selectedBlockIndex < 0) return;
        if (this._presetPreview && !this._presetPreview.hidden) return;
        if (this._presetEditor) this._presetEditor.hidden = false;
        this._syncPresetEditorPreview();
      }

      _toggleFieldsBelow(fieldClass, hide) {
        const field = this.root.querySelector(`.${fieldClass}`);
        if (!field) return;
        let sibling = field.nextElementSibling;
        while (sibling) {
          sibling.style.display = hide ? 'none' : '';
          sibling = sibling.nextElementSibling;
        }
      }

      // --- Preset ---

      _addPresetBlock() {
        this._presetBlocks.push({ type: 'message', role: 'user', name: '', text: '' });
        this._savePresetBlocks();
        this._renderPresetBlockList();
        this._selectBlock(this._presetBlocks.length - 1);
      }

      _ensurePresetBlockIds() {
        let changed = false;
        this._presetBlocks = this._presetBlocks.map((block, index) => {
          const id = String(block?.id || '').trim();
          if (id) return block;
          changed = true;
          return {
            ...block,
            id: `preset_block_${Date.now()}_${index}_${Math.random().toString(36).slice(2, 8)}`,
          };
        });
        if (changed) {
          this._savePresetBlocks();
        }
      }

      _pulsePresetAnchorItem(blockId) {
        if (!blockId || !this._presetBlockList) return;
        const targetEl = this._presetBlockList.querySelector(`.preset-block-item[data-block-id="${blockId}"]`);
        if (!targetEl) return;
        targetEl.classList.remove('preset-block--anchor-pulse');
        void targetEl.offsetWidth;
        targetEl.classList.add('preset-block--anchor-pulse');
        window.setTimeout(() => {
          targetEl.classList.remove('preset-block--anchor-pulse');
        }, 220);
      }

      async _selectBlock(index) {
        this._selectedBlockIndex = index;
        const block = this._presetBlocks[index];
        if (!block) {
          this._presetEditor.hidden = true;
          return;
        }
        // Store draft copy
        this._blockDraft = {
          ...block,
          worldBook: block.worldBook ? { ...block.worldBook } : undefined,
        };
        this._presetEditor.hidden = false;
        this._presetPreview.hidden = true;
        const typeLabels = { message: '消息块', context: '主聊天', subchat: '副聊天', current_input: '当前用户输入', worldinfo: '世界书' };
        this._presetTypeInput.value = typeLabels[block.type] || block.type;
        this._presetRoleInput.value = block.role || 'user';
        this._presetNameInput.value = block.name || '';
        await this._syncPresetEditorPreview();
        this._renderPresetBlockList();
      }

      _movePresetBlockKeepingHoverAnchor(index, dir, anchorEvent = null) {
        this._ensurePresetBlockIds();
        const idx = Number(index);
        const step = Number(dir);
        const target = idx + step;
        if (!Number.isFinite(idx) || !Number.isFinite(step) || target < 0 || target >= this._presetBlocks.length) {
          return;
        }

        const listEl = this._presetBlockList;
        const hoveredBlockId = String(this._hoveredPresetBlockId || '').trim();
        const anchorItem = hoveredBlockId
          ? listEl?.querySelector(`.preset-block-item[data-block-id="${hoveredBlockId}"]`)
          : (anchorEvent?.currentTarget?.closest?.('.preset-block-item') || null);
        const anchorBlockId = hoveredBlockId || String(anchorItem?.dataset?.blockId || '').trim();
        const anchorRectBefore = anchorItem?.getBoundingClientRect?.() || null;
        const listRectBefore = listEl?.getBoundingClientRect?.() || null;
        const anchorTopBefore = (anchorRectBefore && listRectBefore)
          ? (anchorRectBefore.top - listRectBefore.top)
          : null;

        const tmp = this._presetBlocks[idx];
        this._presetBlocks[idx] = this._presetBlocks[target];
        this._presetBlocks[target] = tmp;
        if (this._selectedBlockIndex === idx) this._selectedBlockIndex = target;
        else if (this._selectedBlockIndex === target) this._selectedBlockIndex = idx;

        this._savePresetBlocks();
        this._renderPresetBlockList();

        if (anchorTopBefore == null || !listEl || !anchorBlockId) {
          return;
        }

        requestAnimationFrame(() => {
          const nextAnchorItem = listEl.querySelector(`.preset-block-item[data-block-id="${anchorBlockId}"]`);
          const nextListRect = listEl.getBoundingClientRect();
          const nextAnchorRect = nextAnchorItem?.getBoundingClientRect?.() || null;
          if (!nextAnchorRect || !nextListRect) {
            return;
          }
          const anchorTopAfter = nextAnchorRect.top - nextListRect.top;
          listEl.scrollTop += anchorTopAfter - anchorTopBefore;
          this._pulsePresetAnchorItem(anchorBlockId);
        });
      }

      _renderPresetBlockList() {
        this._ensurePresetBlockIds();
        const typeLabels = { message: '消息块', context: '主聊天', subchat: '副聊天', current_input: '当前用户输入', worldinfo: '世界书' };
        const len = this._presetBlocks.length;
        this._presetBlockList.innerHTML = this._presetBlocks.map((b, i) => {
          const selected = i === this._selectedBlockIndex ? ' preset-block--selected' : '';
          const label = b.type === 'message'
            ? (b.name || typeLabels[b.type] || b.type)
            : (b.type === 'worldinfo' ? (b.name || b.worldBook?.name || typeLabels[b.type] || b.type) : (typeLabels[b.type] || b.type));
          const sub = b.type === 'subchat'
            ? '真实Role'
            : (b.type === 'current_input' ? '本次输入' : (b.role || 'user'));
          const canUp = i > 0;
          const canDown = i < len - 1;
          return `<div class="preset-block-item${selected}" data-index="${i}" data-block-id="${this._esc(b.id || '')}">
            <div class="preset-block-info">
              <span class="preset-block-label">${this._esc(label)}</span>
              <span class="preset-block-sub">${this._esc(sub)}</span>
            </div>
            <div class="preset-block-actions">
              <button class="preset-block-move" data-index="${i}" data-dir="-1" ${canUp ? '' : 'disabled'}>↑</button>
              <button class="preset-block-move" data-index="${i}" data-dir="1" ${canDown ? '' : 'disabled'}>↓</button>
              <button class="preset-block-del" data-index="${i}">×</button>
            </div>
          </div>`;
        }).join('');
        // Bind clicks
        this._presetBlockList.querySelectorAll('.preset-block-item').forEach(el => {
          el.addEventListener('mouseenter', () => {
            this._hoveredPresetBlockId = String(el.dataset.blockId || '').trim();
          });
          el.addEventListener('mouseleave', () => {
            if (this._hoveredPresetBlockId === String(el.dataset.blockId || '').trim()) {
              this._hoveredPresetBlockId = '';
            }
          });
          el.addEventListener('click', (e) => {
            if (e.target.classList.contains('preset-block-del')) {
              const idx = parseInt(e.target.dataset.index);
              this._presetBlocks.splice(idx, 1);
              this._savePresetBlocks();
              if (this._selectedBlockIndex >= this._presetBlocks.length) this._selectedBlockIndex = this._presetBlocks.length - 1;
              if (this._selectedBlockIndex >= 0) this._selectBlock(this._selectedBlockIndex);
              else { this._presetEditor.hidden = true; this._renderPresetBlockList(); }
              return;
            }
            if (e.target.classList.contains('preset-block-move')) {
              const idx = parseInt(e.target.dataset.index);
              const dir = parseInt(e.target.dataset.dir);
              this._movePresetBlockKeepingHoverAnchor(idx, dir, e);
              return;
            }
            this._selectBlock(parseInt(el.dataset.index));
          });
        });
      }

      async _savePresetBlocks() {
        try {
          const db = this._db || await this._dbReady;
          const tx = db.transaction('config', 'readwrite');
          tx.objectStore('config').put(this._presetBlocks, 'presetBlocks');
        } catch (e) {
          console.warn('[TinyChat] Save preset failed', e);
        }
      }

      async _restorePresetBlocks() {
        try {
          const db = await this._dbReady;
          const tx = db.transaction('config', 'readonly');
          const req = tx.objectStore('config').get('presetBlocks');
          req.onsuccess = () => {
            if (Array.isArray(req.result)) {
              this._presetBlocks = req.result;
              this._renderPresetBlockList();
            }
          };
        } catch (e) {
          console.warn('[TinyChat] Restore preset failed', e);
        }
      }

      getPresetBlocks() {
        return this._presetBlocks.slice();
      }

      _importPreset() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = () => {
          const file = input.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = () => {
            try {
              const data = JSON.parse(reader.result);
              if (Array.isArray(data)) {
                this._presetBlocks = data;
              } else if (Array.isArray(data.blocks)) {
                this._presetBlocks = data.blocks;
              } else {
                throw new Error('Invalid format');
              }
              this._selectedBlockIndex = -1;
              this._presetEditor.hidden = true;
              this._presetPreview.hidden = true;
              this._savePresetBlocks();
              this._renderPresetBlockList();
            } catch (e) {
              alert('导入失败: ' + e.message);
            }
          };
          reader.readAsText(file);
        };
        input.click();
      }

      _exportPreset() {
        if (!this._presetBlocks.length) return;
        const json = JSON.stringify(this._presetBlocks, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'tinychat-preset.json';
        a.click();
        URL.revokeObjectURL(url);
      }

      async _buildPreviewMessages(options = {}) {
        const messages = [];
        for (const block of this._presetBlocks) {
          if (block.type === 'subchat') {
            messages.push(...this._getSecondaryChatMessages(block));
            continue;
          }

          if (block.type === 'current_input') {
            const content = String(arguments[0]?.currentInputText || '').trim();
            if (content) {
              messages.push({ role: 'user', content });
            }
            continue;
          }

          const role = String(block.role || '').trim();
          if (!role) continue;
          if (block.type === 'message') {
            const text = String(block.text || '').trim();
            if (text) messages.push({ role, content: text });
          } else if (block.type === 'context') {
            const chatContent = this._buildMainChatPreviewText();
            if (chatContent && chatContent !== '暂无聊天记录' && chatContent !== '暂无匹配内容') {
              messages.push({ role: role || 'system', content: chatContent });
            }
          } else if (block.type === 'worldinfo') {
            const worldBookText = await this._buildWorldBookPreviewText(this._getPresetWorldBookBinding(block));
            if (worldBookText && !['未添加世界书', '未选择世界书', '未连接酒馆，无法读取世界书', '暂无触发内容', '暂无内容'].includes(worldBookText)) {
              messages.push({ role: role || 'system', content: worldBookText });
            }
          }
        }
        return messages;
      }

      async _buildRequestMessages(userText = '') {
        return this._buildPreviewMessages({ currentInputText: userText });
      }

      async _showPresetPreview() {
        this._previewMode = 'readable';
        this._presetEditor.hidden = true;
        this._presetPreview.hidden = false;
        this._selectedBlockIndex = -1;
        this._renderPresetBlockList();
        await this._renderPreviewContent();
        this.root.querySelector('.preset-preview-toggle').textContent = '原始JSON';
      }

      _togglePreviewMode() {
        const btn = this.root.querySelector('.preset-preview-toggle');
        if (this._previewMode === 'readable') {
          this._previewMode = 'json';
          btn.textContent = '可读文本';
        } else {
          this._previewMode = 'readable';
          btn.textContent = '原始JSON';
        }
        this._renderPreviewContent();
      }

      async _renderPreviewContent() {
        const messages = await this._buildPreviewMessages();
        if (this._previewMode === 'json') {
          const json = JSON.stringify(messages, null, 2);
          this._presetPreviewList.innerHTML = `<pre class="preview-pre">${json.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</pre>`;
        } else {
          const readable = messages
            .map(m => String(m.content || '').trim())
            .filter(Boolean)
            .join('\n\n');
          this._presetPreviewList.innerHTML = `<pre class="preview-pre">${(readable || '暂无内容').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</pre>`;
        }
      }

      _saveBlockDraft() {
        if (this._selectedBlockIndex >= 0 && this._blockDraft) {
          const block = this._presetBlocks[this._selectedBlockIndex];
          const nextBlock = { ...this._blockDraft };
          if (nextBlock.type === 'message') {
            delete nextBlock.worldBook;
          } else if (nextBlock.type === 'context') {
            nextBlock.name = '';
            delete nextBlock.worldBook;
            nextBlock.text = this._presetTextInput.value;
          } else if (nextBlock.type === 'subchat') {
            nextBlock.name = '';
            nextBlock.role = '';
            nextBlock.subChatRangeN = this._presetSubchatRangeInput.value;
            delete nextBlock.worldBook;
            nextBlock.text = this._presetTextInput.value;
          } else if (nextBlock.type === 'current_input') {
            nextBlock.name = '';
            nextBlock.role = '';
            delete nextBlock.worldBook;
            nextBlock.text = '本次发送时，会在这里注入当前用户输入';
          } else if (nextBlock.type === 'worldinfo') {
            const binding = this._getPresetWorldBookBinding(nextBlock);
            nextBlock.worldBook = binding || undefined;
            nextBlock.name = binding?.name || '';
            nextBlock.text = this._presetTextInput.value;
          }
          Object.assign(block, nextBlock);
          this._blockDraft = null;
          this._savePresetBlocks();
          this._renderPresetBlockList();
        }
      }

      _discardBlockDraft() {
        this._blockDraft = null;
        this._presetEditor.hidden = true;
        this._selectedBlockIndex = -1;
        this._renderPresetBlockList();
      }

      _clearRightPage() {
        this._presetEditor.hidden = true;
        this._presetPreview.hidden = true;
        this._selectedBlockIndex = -1;
        this._blockDraft = null;
        this._renderPresetBlockList();
      }

      // --- Main Chat Methods ---

      _addXmlRule() {
        this._mainChatConfig.xmlRules.push({ tag: '', mode: 'include', n: '' });
        this._saveMainChatConfig();
        this._renderXmlRules();
      }

      _deleteXmlRule(index) {
        this._mainChatConfig.xmlRules.splice(index, 1);
        this._saveMainChatConfig();
        this._renderXmlRules();
      }

      _toggleRuleMode(index) {
        const rule = this._mainChatConfig.xmlRules[index];
        if (rule) {
          rule.mode = rule.mode === 'exclude' ? 'include' : 'exclude';
          this._saveMainChatConfig();
          this._renderXmlRules();
        }
      }

      _renderXmlRules() {
        const rules = this._mainChatConfig.xmlRules;
        if (!rules.length) {
          this._mainchatRulesEl.innerHTML = '<div class="mainchat-empty">无规则，AI消息将按原文读取</div>';
          return;
        }
        this._mainchatRulesEl.innerHTML = rules.map((rule, i) => `
          <div class="mainchat-rule" data-rule-index="${i}">
            <div class="mainchat-rule-top">
              <div class="field mainchat-rule-tag-field">
                <label class="api-label">标签名</label>
                <input class="api-input mainchat-rule-tag" type="text" maxlength="24" spellcheck="false" value="${rule.tag}" placeholder="标签名" data-rule-index="${i}" />
              </div>
              <button class="preset-action-btn mainchat-rule-del" type="button" data-rule-index="${i}">×</button>
            </div>
            <div class="mainchat-rule-bottom">
              <button class="preset-action-btn mainchat-rule-mode" type="button" data-rule-index="${i}">${rule.mode === 'exclude' ? '排除最近N楼' : '最近N楼'}</button>
              <div class="field mainchat-rule-n-field">
                <input class="api-input mainchat-rule-n" type="number" min="0" max="99" step="1" value="${rule.n}" placeholder="N" data-rule-index="${i}" />
              </div>
            </div>
          </div>
        `).join('');

        // Bind rule events
        this._mainchatRulesEl.querySelectorAll('.mainchat-rule-tag').forEach(el => {
          el.addEventListener('input', () => {
            const idx = parseInt(el.dataset.ruleIndex);
            this._mainChatConfig.xmlRules[idx].tag = el.value;
            this._saveMainChatConfig();
          });
        });
        this._mainchatRulesEl.querySelectorAll('.mainchat-rule-n').forEach(el => {
          el.addEventListener('input', () => {
            const idx = parseInt(el.dataset.ruleIndex);
            this._mainChatConfig.xmlRules[idx].n = el.value;
            this._saveMainChatConfig();
          });
        });
        this._mainchatRulesEl.querySelectorAll('.mainchat-rule-del').forEach(el => {
          el.addEventListener('click', () => this._deleteXmlRule(parseInt(el.dataset.ruleIndex)));
        });
        this._mainchatRulesEl.querySelectorAll('.mainchat-rule-mode').forEach(el => {
          el.addEventListener('click', () => this._toggleRuleMode(parseInt(el.dataset.ruleIndex)));
        });
      }

      _saveMainChatConfig() {
        this._mainChatConfig.contextN = this._mainchatAiN.value;
        this._mainChatConfig.userN = this._mainchatUserN.value;
        this._dbReady.then(db => {
          const tx = db.transaction('config', 'readwrite');
          tx.objectStore('config').put(this._mainChatConfig, 'mainChatConfig');
        }).catch(e => console.warn('[TinyChat] Save mainChat failed', e));
      }

      async _restoreMainChatConfig() {
        try {
          const db = await this._dbReady;
          const tx = db.transaction('config', 'readonly');
          const req = tx.objectStore('config').get('mainChatConfig');
          req.onsuccess = () => {
            if (req.result) {
              this._mainChatConfig = { contextN: '', userN: '', xmlRules: [], ...req.result };
              this._mainchatAiN.value = this._mainChatConfig.contextN;
              this._mainchatUserN.value = this._mainChatConfig.userN;
              this._renderXmlRules();
            } else {
              this._renderXmlRules();
            }
          };
        } catch (e) {
          console.warn('[TinyChat] Restore mainChat failed', e);
          this._renderXmlRules();
        }
      }

      _getSillyTavernContext() {
        const candidates = [window];
        try {
          if (window.opener && window.opener !== window) candidates.push(window.opener);
        } catch (e) {}
        try {
          if (window.parent && window.parent !== window) candidates.push(window.parent);
        } catch (e) {}
        try {
          if (window.top && window.top !== window) candidates.push(window.top);
        } catch (e) {}

        for (const candidate of candidates) {
          try {
            if (!candidate || !candidate.SillyTavern || typeof candidate.SillyTavern.getContext !== 'function') {
              continue;
            }
            const context = candidate.SillyTavern.getContext();
            if (context && Array.isArray(context.chat)) {
              return context;
            }
          } catch (e) {}
        }
        return null;
      }

      _normalizeLiveChatMessageText(value) {
        return String(value == null ? '' : value)
          .replace(/\r\n?/g, '\n')
          .trim();
      }

      _getLiveChatMessageRole(rawMessage) {
        if (!rawMessage || typeof rawMessage !== 'object') return '';
        if (rawMessage.is_user) return 'user';
        if (rawMessage.is_system) return 'system';
        const rawRole = String(rawMessage.role || '').trim().toLowerCase();
        if (rawRole === 'user') return 'user';
        if (rawRole === 'system') return 'system';
        return 'assistant';
      }

      _readLiveChatMessagesFromContext(context = this._getSillyTavernContext()) {
        const rawMessages = context && Array.isArray(context.chat) ? context.chat : null;
        if (!rawMessages) return null;
        return rawMessages.reduce((result, rawMessage) => {
          const role = this._getLiveChatMessageRole(rawMessage);
          if (role !== 'user' && role !== 'assistant') {
            return result;
          }
          const content = this._normalizeLiveChatMessageText(rawMessage.mes ?? rawMessage.content ?? '');
          if (!content) {
            return result;
          }
          result.push({ role, content });
          return result;
        }, []);
      }

      _getCurrentChatPreviewMessages() {
        const contextMessages = this._readLiveChatMessagesFromContext();
        if (Array.isArray(contextMessages)) {
          return contextMessages;
        }
        return Array.isArray(this._chatHistory) ? this._chatHistory.slice() : [];
      }

      _getSecondaryChatMessages(block = null) {
        const history = Array.isArray(this._chatHistory) ? this._chatHistory : [];
        const messages = history.reduce((result, message) => {
          const role = String(message?.role || '').trim().toLowerCase();
          const content = String(message?.content || '').trim();
          if (!content) return result;
          if (role === 'user' || role === 'assistant' || role === 'system') {
            result.push({ role, content });
          }
          return result;
        }, []);

        const rangeStr = String(block?.subChatRangeN ?? '').trim();
        if (rangeStr === '') return messages;
        const rangeN = parseInt(rangeStr, 10);
        if (!Number.isFinite(rangeN) || rangeN <= 0) return [];
        return messages.slice(Math.max(0, messages.length - rangeN));
      }

      _buildSecondaryChatPreviewText(block = null) {
        const lines = this._getSecondaryChatMessages(block).map(message => {
          if (message.role === 'user') return `用户：${message.content}`;
          if (message.role === 'assistant') return `AI：${message.content}`;
          if (message.role === 'system') return `系统：${message.content}`;
          return message.content;
        }).filter(Boolean);
        return lines.length ? lines.join('\n\n') : '暂无当前聊天内容';
      }


      _buildMainChatPreviewText() {
        const config = this._mainChatConfig;
        const history = this._getCurrentChatPreviewMessages();
        if (!history.length) {
          return '暂无聊天记录';
        }

        const aiMessages = history
          .map((m, i) => ({ index: i, message: m }))
          .filter(item => item.message.role === 'assistant');
        const userMessages = history
          .map((m, i) => ({ index: i, message: m }))
          .filter(item => item.message.role === 'user');

        const aiInRange = {};
        const userInRange = {};
        const rules = (config.xmlRules || []).filter(r => String(r.tag || '').trim());

        if (rules.length) {
          rules.forEach(rule => {
            const nStr = String(rule.n || '').trim();
            if (nStr === '0') return;
            let start = 0, end = aiMessages.length;
            if (nStr !== '') {
              const n = parseInt(nStr, 10) || 0;
              if (n <= 0) return;
              if (rule.mode === 'exclude') {
                end = Math.max(0, aiMessages.length - n);
              } else {
                start = Math.max(0, aiMessages.length - n);
              }
            }
            for (let i = start; i < end; i++) {
              const item = aiMessages[i];
              if (!aiInRange[item.index]) aiInRange[item.index] = [];
              aiInRange[item.index].push(String(rule.tag).trim());
            }
          });
        } else {
          const aiRangeStr = String(config.contextN || '').trim();
          let start = 0, end = aiMessages.length;
          if (aiRangeStr === '0') {
            end = 0;
          } else if (aiRangeStr !== '') {
            const n = parseInt(aiRangeStr, 10) || 0;
            start = Math.max(0, aiMessages.length - n);
          }
          for (let i = start; i < end; i++) {
            aiInRange[aiMessages[i].index] = ['__full__'];
          }
        }

        const userNStr = String(config.userN || '').trim();
        if (userNStr !== '0') {
          let start = 0, end = userMessages.length;
          if (userNStr !== '') {
            const n = parseInt(userNStr, 10) || 0;
            if (n > 0) start = Math.max(0, userMessages.length - n);
          }
          for (let i = start; i < end; i++) {
            userInRange[userMessages[i].index] = true;
          }
        }

        const result = [];
        for (let i = 0; i < history.length; i++) {
          const msg = history[i];
          if (msg.role === 'user') {
            if (userInRange[i]) result.push(`用户：${msg.content}`);
            continue;
          }
          if (!aiInRange[i]) continue;
          const tags = aiInRange[i];
          const parts = tags.map(tag => {
            if (tag === '__full__') return msg.content;
            const regex = new RegExp(`<${tag}[^>]*>([\\s\\S]*?)<\\/${tag}>`, 'gi');
            const matches = [];
            let m;
            while ((m = regex.exec(msg.content)) !== null) matches.push(m[1].trim());
            return matches.length ? `<${tag}>\n${matches.join('\n')}\n</${tag}>` : '';
          }).filter(Boolean);
          if (parts.length) result.push(`AI：${parts.join('\n\n')}`);
        }

        return result.length ? result.join('\n\n') : '暂无匹配内容';
      }

      _refreshMainChatPreview() {
        this._mainchatPreviewText.textContent = this._buildMainChatPreviewText();
      }

      _getNormalizedWorldBooks() {
        return Array.isArray(this._worldBooks)
          ? this._worldBooks
              .map(wb => ({
                name: String(wb?.name || '').trim(),
                scope: String(wb?.scope || 'global').trim() || 'global',
                ownerId: String(wb?.ownerId || '').trim(),
              }))
              .filter(wb => wb.name)
          : [];
      }

      _getCurrentChatWorldBookCandidates() {
        const configured = this._getNormalizedWorldBooks();
        const preferred = configured.filter(wb => wb.scope === 'chat' || wb.scope === 'character');
        return preferred.length ? preferred : configured;
      }

      async _fetchWorldBookByBinding(binding) {
        const stApi = this._getSTAPI();
        if (!stApi?.worldBook?.get || !binding?.name) {
          return null;
        }
        try {
          const result = await stApi.worldBook.get({
            name: binding.name,
            scope: binding.scope || undefined,
          });
          if (result?.worldBook) {
            return result;
          }
        } catch (e) {}
        return null;
      }

      async _readTriggeredWorldBookPayloads(bindings = this._getCurrentChatWorldBookCandidates()) {
        if (!bindings.length) {
          return [];
        }
        const results = [];
        for (const binding of bindings) {
          const result = await this._fetchWorldBookByBinding(binding);
          if (result?.worldBook) {
            results.push({ binding, result });
          }
        }
        return results;
      }

      _formatWorldBookEntries(result, binding = null) {
        const entries = Array.isArray(result?.worldBook?.entries) ? result.worldBook.entries : [];
        const enabledEntries = entries.filter(entry => entry?.enabled !== false && String(entry?.content || '').trim());
        if (!enabledEntries.length) {
          return '';
        }
        const scopeLabel = result?.scope || binding?.scope || 'global';
        return [
          `世界书：${result?.worldBook?.name || binding?.name || ''}`,
          `作用域：${scopeLabel}`,
          ...enabledEntries.map(entry => {
            const entryName = String(entry?.name || '').trim();
            const entryContent = String(entry?.content || '').trim();
            return entryName ? `${entryName}：${entryContent}` : entryContent;
          })
        ].filter(Boolean).join('\n');
      }

      _normalizeWorldBookEntryKeywords(values) {
        return Array.isArray(values)
          ? values.map(value => String(value || '').trim()).filter(Boolean)
          : [];
      }

      _getWorldBookEntryKeywords(entry = null) {
        return this._normalizeWorldBookEntryKeywords([
          ...(Array.isArray(entry?.key) ? entry.key : []),
          ...(Array.isArray(entry?.secondaryKey) ? entry.secondaryKey : []),
        ]);
      }

      _isWorldBookEntryTriggered(entry = null, contextText = '') {
        if (!entry || entry.enabled === false || !String(entry?.content || '').trim()) {
          return false;
        }

        const activationMode = String(entry?.activationMode || '').trim().toLowerCase();
        if (activationMode === 'always') {
          return true;
        }

        const keywords = this._getWorldBookEntryKeywords(entry);
        if (!keywords.length) {
          return false;
        }

        const useCaseSensitive = entry?.caseSensitive === true;
        const normalizedContext = useCaseSensitive
          ? String(contextText || '')
          : String(contextText || '').toLowerCase();

        return keywords.some(keyword => {
          const normalizedKeyword = useCaseSensitive ? keyword : keyword.toLowerCase();
          return normalizedKeyword ? normalizedContext.includes(normalizedKeyword) : false;
        });
      }

      _getWorldBookEntrySortValue(entry, field, fallbackValue) {
        const rawValue = field === 'uid'
          ? (entry?.uid ?? entry?.index)
          : entry?.[field];
        return Number.isFinite(Number(rawValue)) ? Number(rawValue) : fallbackValue;
      }

      _sortWorldBookEntriesForOutput(entries) {
        return (Array.isArray(entries) ? entries.slice() : []).sort((left, right) => {
          const leftOrder = this._getWorldBookEntrySortValue(left, 'order', Number.POSITIVE_INFINITY);
          const rightOrder = this._getWorldBookEntrySortValue(right, 'order', Number.POSITIVE_INFINITY);
          if (leftOrder !== rightOrder) {
            return leftOrder - rightOrder;
          }

          const leftUid = this._getWorldBookEntrySortValue(left, 'uid', Number.POSITIVE_INFINITY);
          const rightUid = this._getWorldBookEntrySortValue(right, 'uid', Number.POSITIVE_INFINITY);
          if (leftUid !== rightUid) {
            return leftUid - rightUid;
          }

          const leftIndex = this._getWorldBookEntrySortValue(left, 'index', Number.POSITIVE_INFINITY);
          const rightIndex = this._getWorldBookEntrySortValue(right, 'index', Number.POSITIVE_INFINITY);
          return leftIndex - rightIndex;
        });
      }

      _formatTriggeredWorldBookEntryPreviewLine(entry) {
        const matchedEntryName = String(entry?.name || '').trim();
        const matchedEntryContent = String(entry?.content || '').trim();
        const orderText = Number.isFinite(Number(entry?.order)) ? String(Number(entry.order)) : '-';
        const uidRaw = entry?.uid ?? entry?.index;
        const uidText = Number.isFinite(Number(uidRaw)) ? String(Number(uidRaw)) : '-';
        const prefix = `[order:${orderText} uid:${uidText}] `;
        return matchedEntryName
          ? `${prefix}${matchedEntryName}：${matchedEntryContent}`
          : `${prefix}${matchedEntryContent}`;
      }

      _formatTriggeredWorldBookEntryPromptLine(entry) {
        return String(entry?.content || '').trim();
      }

      _buildWorldBookTriggerContextText() {
        const blocks = Array.isArray(this._presetBlocks) ? this._presetBlocks : [];
        const contextParts = [];

        for (const block of blocks) {
          if (block?.type === 'context') {
            const content = this._buildMainChatPreviewText();
            if (content && content !== '暂无聊天记录' && content !== '暂无匹配内容') {
              contextParts.push(content);
            }
            continue;
          }

          if (block?.type === 'subchat') {
            const content = this._buildSecondaryChatPreviewText(block);
            if (content && content !== '暂无当前聊天内容') {
              contextParts.push(content);
            }
          }
        }

        return contextParts.filter(Boolean).join('\n\n').trim();
      }

      async _getTriggeredWorldBookEntries(binding = null) {
        const result = await this._fetchWorldBookByBinding(binding);
        if (!result?.worldBook) {
          return { result: null, matchedEntries: [], contextText: '' };
        }

        const contextText = this._buildWorldBookTriggerContextText();
        if (!contextText) {
          return { result, matchedEntries: [], contextText: '' };
        }

        const worldBookEntries = Array.isArray(result.worldBook.entries) ? result.worldBook.entries : [];
        const matchedEntries = this._sortWorldBookEntriesForOutput(
          worldBookEntries.filter(entry => this._isWorldBookEntryTriggered(entry, contextText))
        ).slice(0, 20);

        return { result, matchedEntries, contextText };
      }

      _getPresetWorldBookBinding(block = this._blockDraft) {
        if (!block || block.type !== 'worldinfo') return null;
        const source = block.worldBook && typeof block.worldBook === 'object'
          ? block.worldBook
          : { name: block.name, scope: block.scope || block.worldBookScope, ownerId: block.ownerId };
        const name = String(source?.name || '').trim();
        if (!name) return null;
        return {
          name,
          scope: String(source?.scope || 'global').trim() || 'global',
          ownerId: String(source?.ownerId || '').trim(),
        };
      }

      async _buildWorldBookPreviewText(binding = undefined) {
        const hasBindingArgument = arguments.length > 0;
        const bindings = hasBindingArgument ? (binding ? [binding] : []) : this._getNormalizedWorldBooks();
        if (!bindings.length) return hasBindingArgument ? '未选择世界书' : '未添加世界书';
        const stApi = this._getSTAPI();
        if (!stApi?.worldBook?.get) return '未连接酒馆，无法读取世界书';

        const chunks = [];
        for (const itemBinding of bindings) {
          const { result, matchedEntries, contextText } = await this._getTriggeredWorldBookEntries(itemBinding);
          if (!result?.worldBook) {
            continue;
          }
          if (!contextText || !matchedEntries.length) {
            continue;
          }
          const promptLines = matchedEntries
            .map(entry => this._formatTriggeredWorldBookEntryPromptLine(entry))
            .filter(Boolean);
          if (promptLines.length) {
            chunks.push(promptLines.join('\n'));
          }
        }

        return chunks.length ? chunks.join('\n\n') : '暂无触发内容';
      }

      async _buildWorldBookTriggeredPreviewText(binding = null) {
        if (!binding?.name) {
          return '未选择世界书';
        }
        const stApi = this._getSTAPI();
        if (!stApi?.worldBook?.get) {
          return '未连接酒馆，无法读取世界书';
        }

        const { result, matchedEntries, contextText } = await this._getTriggeredWorldBookEntries(binding);
        if (!result?.worldBook) {
          return '未找到世界书';
        }
        if (!contextText || !matchedEntries.length) {
          return '暂无触发内容';
        }

        return [
          `世界书触发：${result.worldBook.name || binding.name}`,
          '',
          '--- 预览（含调试信息）---',
          ...matchedEntries.map(entry => this._formatTriggeredWorldBookEntryPreviewLine(entry)),
          '',
          '--- 实际注入 Prompt（纯条目内容）---',
          ...matchedEntries.map(entry => this._formatTriggeredWorldBookEntryPromptLine(entry)).filter(Boolean),
        ].filter(line => line !== null && line !== undefined).join('\n');
      }

      _hideWbTriggeredPreview() {
        if (this._wbTriggeredPreview) this._wbTriggeredPreview.hidden = true;
        if (this._wbTriggeredPreviewText) this._wbTriggeredPreviewText.textContent = '点击预览查看触发结果';
        if (this._wbPicker) this._wbPicker.hidden = false;
        if (this._wbTriggeredPreviewBack) this._wbTriggeredPreviewBack.dataset.backMode = 'picker';
      }

      async _showWorldBookTriggeredPreview(binding = null, backMode = 'picker') {
        if (this._wbPicker) this._wbPicker.hidden = true;
        if (this._wbTriggeredPreview) this._wbTriggeredPreview.hidden = false;
        if (this._wbTriggeredPreviewText) this._wbTriggeredPreviewText.textContent = '读取中...';
        if (this._wbTriggeredPreviewBack) this._wbTriggeredPreviewBack.dataset.backMode = backMode;
        try {
          const previewText = await this._buildWorldBookTriggeredPreviewText(binding);
          if (this._wbTriggeredPreviewText) this._wbTriggeredPreviewText.textContent = previewText;
        } catch (e) {
          if (this._wbTriggeredPreviewText) this._wbTriggeredPreviewText.textContent = '读取失败: ' + e.message;
        }
      }

      _renderPresetWorldinfoCards() {
        if (!this._presetWorldinfoList) return;
        const selected = this._getPresetWorldBookBinding(this._blockDraft);
        const selectedKey = selected ? `${selected.name}::${selected.scope}::${selected.ownerId}` : '';
        let worldBooks = this._getNormalizedWorldBooks();
        if (selected && !worldBooks.some(wb => `${wb.name}::${wb.scope}::${wb.ownerId}` === selectedKey)) {
          worldBooks = [selected, ...worldBooks];
        }
        if (!worldBooks.length) {
          this._presetWorldinfoList.innerHTML = '<div class="preset-worldinfo-empty">未添加世界书</div>';
          return;
        }
        this._presetWorldinfoList.innerHTML = worldBooks.map((wb) => {
          const key = `${wb.name}::${wb.scope}::${wb.ownerId}`;
          const isSelected = key === selectedKey;
          return `
            <div class="preset-worldinfo-card${isSelected ? ' is-selected' : ''}">
              <span class="preset-worldinfo-card-name" title="${this._escapeHtml(wb.name || '未命名')}">${this._escapeHtml(wb.name || '未命名')}</span>
              <button class="preset-action-btn preset-worldinfo-add" type="button" data-wb-name="${this._escapeHtml(wb.name)}" data-wb-scope="${this._escapeHtml(wb.scope || 'global')}" data-wb-owner-id="${this._escapeHtml(wb.ownerId || '')}">${isSelected ? '已选' : '添加'}</button>
            </div>
          `;
        }).join('');

        this._presetWorldinfoList.querySelectorAll('.preset-worldinfo-add').forEach(el => {
          el.addEventListener('click', async () => {
            if (!this._blockDraft || this._blockDraft.type !== 'worldinfo') return;
            const binding = {
              name: String(el.dataset.wbName || '').trim(),
              scope: String(el.dataset.wbScope || 'global').trim() || 'global',
              ownerId: String(el.dataset.wbOwnerId || '').trim(),
            };
            if (!binding.name) return;
            this._blockDraft.worldBook = binding;
            this._blockDraft.name = binding.name;
            this._presetTextInput.value = await this._buildWorldBookPreviewText(binding);
            this._renderPresetWorldinfoCards();
          });
        });
      }

      async _syncPresetEditorPreview() {
        if (!this._blockDraft) return;
        const blockType = this._blockDraft.type;
        const isMessage = blockType === 'message';
        const isWorldInfo = blockType === 'worldinfo';
        const isSubChat = blockType === 'subchat';
        const isCurrentInput = blockType === 'current_input';
        const nameField = this.root.querySelector('.preset-field-name');
        const roleField = this.root.querySelector('.preset-field-role');
        if (nameField) nameField.style.display = isMessage ? '' : 'none';
        if (roleField) {
          roleField.style.display = '';
          roleField.classList.toggle('is-subchat', isSubChat);
        }
        if (this._presetRoleControl) this._presetRoleControl.hidden = isSubChat || isCurrentInput;
        if (this._presetSubchatControl) this._presetSubchatControl.hidden = !isSubChat;
        if (this._presetSubchatReset) this._presetSubchatReset.hidden = !isSubChat;
        if (isSubChat || isCurrentInput) this._presetRoleList.hidden = true;
        if (this._presetNameInput) this._presetNameInput.value = isMessage ? (this._blockDraft.name || '') : '';
        if (this._presetSubchatRangeInput) this._presetSubchatRangeInput.value = isSubChat ? (this._blockDraft.subChatRangeN || '') : '';
        if (this._presetWorldinfoBox) this._presetWorldinfoBox.hidden = !isWorldInfo;
        if (this._presetTextInput) this._presetTextInput.style.display = isWorldInfo ? 'none' : '';

        if (isMessage) {
          this._presetTextInput.readOnly = false;
          this._presetTextInput.value = this._blockDraft.text || '';
          this._presetTextInput.placeholder = '内容';
          return;
        }

        this._presetTextInput.readOnly = true;
        this._presetTextInput.placeholder = '';
        if (blockType === 'context') {
          this._presetTextInput.value = this._buildMainChatPreviewText();
          return;
        }
        if (blockType === 'subchat') {
          this._presetTextInput.value = this._buildSecondaryChatPreviewText(this._blockDraft);
          return;
        }
        if (blockType === 'current_input') {
          this._presetTextInput.value = '本次发送时，会在这里注入当前用户输入';
          return;
        }
        if (blockType === 'worldinfo') {
          this._presetTextInput.value = await this._buildWorldBookPreviewText(this._getPresetWorldBookBinding(this._blockDraft));
          this._renderPresetWorldinfoCards();
          return;
        }
        this._presetTextInput.value = this._blockDraft.text || '';
      }

      // --- World Book Methods ---

      _renderWbCards() {
        const worldBooks = this._getNormalizedWorldBooks();
        if (!worldBooks.length) {
          this._wbCardList.innerHTML = '<div class="mainchat-empty">未添加世界书</div>';
          return;
        }
        this._wbCardList.innerHTML = worldBooks.map((wb, i) => `
          <div class="wb-card" data-wb-index="${i}">
            <span class="wb-card-name">${wb.name || '未命名'}</span>
            <div class="wb-card-actions">
              <button class="preset-action-btn wb-card-preview" type="button" data-wb-index="${i}">预览</button>
              <button class="preset-action-btn wb-card-del" type="button" data-wb-index="${i}">×</button>
            </div>
          </div>
        `).join('');

        this._wbCardList.querySelectorAll('.wb-card-del').forEach(el => {
          el.addEventListener('click', () => {
            const idx = parseInt(el.dataset.wbIndex);
            this._worldBooks.splice(idx, 1);
            this._saveWorldBooks();
            this._renderWbCards();
            if (this._blockDraft?.type === 'worldinfo') this._renderPresetWorldinfoCards();
          });
        });
        this._wbCardList.querySelectorAll('.wb-card-preview').forEach(el => {
          el.addEventListener('click', async () => {
            const idx = parseInt(el.dataset.wbIndex);
            const binding = worldBooks[idx] || null;
            await this._showWorldBookTriggeredPreview(binding, 'card');
          });
        });
      }

      _getSTAPI() {
        const candidates = [window];
        try {
          if (window.opener && window.opener !== window) candidates.push(window.opener);
        } catch (e) {}
        try {
          if (window.parent && window.parent !== window) candidates.push(window.parent);
        } catch (e) {}
        try {
          if (window.top && window.top !== window) candidates.push(window.top);
        } catch (e) {}

        for (const candidate of candidates) {
          try {
            if (candidate && candidate.ST_API) return candidate.ST_API;
          } catch (e) {}
        }
        return null;
      }

      _escapeHtml(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      async _openWbPicker() {
        this._wbPicker.hidden = false;
        this._wbPickerList.innerHTML = '<div class="mainchat-empty">加载中...</div>';
        try {
          const stApi = this._getSTAPI();
          if (!stApi?.worldBook?.list) {
            this._wbPickerList.innerHTML = '<div class="mainchat-empty">未连接酒馆，无法获取世界书</div>';
            return;
          }

          const result = await stApi.worldBook.list();
          const worldBooks = Array.isArray(result?.worldBooks) ? result.worldBooks : [];
          if (!worldBooks.length) {
            this._wbPickerList.innerHTML = '<div class="mainchat-empty">酒馆中无世界书</div>';
            return;
          }

          this._wbPickerList.innerHTML = worldBooks.map((wb) => {
            const safeName = this._escapeHtml(wb?.name || '');
            const safeScope = this._escapeHtml(wb?.scope || 'global');
            const ownerId = this._escapeHtml(wb?.ownerId || '');
            return `
              <div class="wb-picker-card" data-wb-name="${safeName}" data-wb-scope="${safeScope}" data-wb-owner-id="${ownerId}">
                <span class="wb-card-name">${safeName}</span>
                <div class="wb-card-actions">
                  <button class="preset-action-btn wb-picker-add" type="button" data-wb-name="${safeName}" data-wb-scope="${safeScope}" data-wb-owner-id="${ownerId}">添加</button>
                  <button class="preset-action-btn wb-picker-preview" type="button" data-wb-name="${safeName}" data-wb-scope="${safeScope}" data-wb-owner-id="${ownerId}">预览</button>
                </div>
              </div>
            `;
          }).join('');

          this._wbPickerList.querySelectorAll('.wb-picker-add').forEach(el => {
            el.addEventListener('click', () => {
              const name = String(el.dataset.wbName || '').trim();
              const scope = String(el.dataset.wbScope || 'global').trim() || 'global';
              const ownerId = String(el.dataset.wbOwnerId || '').trim();
              if (!this._worldBooks.find(w => String(w?.name || '').trim() === name && String(w?.scope || 'global').trim() === scope && String(w?.ownerId || '').trim() === ownerId)) {
                this._worldBooks.push({ name, scope, ownerId });
                this._saveWorldBooks();
                this._renderWbCards();
                if (this._blockDraft?.type === 'worldinfo') this._renderPresetWorldinfoCards();
              }
            });
          });

          this._wbPickerList.querySelectorAll('.wb-picker-preview').forEach(el => {
            el.addEventListener('click', async () => {
              const binding = {
                name: String(el.dataset.wbName || '').trim(),
                scope: String(el.dataset.wbScope || 'global').trim() || 'global',
                ownerId: String(el.dataset.wbOwnerId || '').trim(),
              };
              await this._showWorldBookTriggeredPreview(binding, 'picker');
            });
          });
        } catch (e) {
          this._wbPickerList.innerHTML = '<div class="mainchat-empty">获取失败: ' + this._escapeHtml(e.message) + '</div>';
        }
      }

      _saveWorldBooks() {
        this._dbReady.then(db => {
          const tx = db.transaction('config', 'readwrite');
          tx.objectStore('config').put(this._worldBooks, 'worldBooks');
        }).catch(e => console.warn('[TinyChat] Save worldBooks failed', e));
      }

      async _restoreWorldBooks() {
        try {
          const db = await this._dbReady;
          const tx = db.transaction('config', 'readonly');
          const req = tx.objectStore('config').get('worldBooks');
          req.onsuccess = () => {
            if (Array.isArray(req.result)) {
              this._worldBooks = req.result;
            }
            this._renderWbCards();
          };
        } catch (e) {
          console.warn('[TinyChat] Restore worldBooks failed', e);
          this._renderWbCards();
        }
      }

      // --- IndexedDB Persistence ---

      _openDB() {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open('TinyChatDB', 5);
          req.onupgradeneeded = () => {
            const db = req.result;
            if (!db.objectStoreNames.contains('config')) {
              db.createObjectStore('config');
            }
          };
          req.onsuccess = () => { this._db = req.result; resolve(this._db); };
          req.onerror = () => { console.warn('[TinyChat] IndexedDB open failed', req.error); reject(req.error); };
        });
      }

      async _saveApiConfig() {
        try {
          const db = this._db || await this._dbReady;
          const record = {
            url: this.apiUrlInput.value.trim(),
            key: this.apiKeyInput.value.trim(),
            model: this.apiModelInput.value.trim(),
            stream: this._apiConfig.stream,
            streamMode: this._apiConfig.streamMode,
            deepseekThinking: this._apiConfig.deepseekThinking,
            deepseekEffort: this._apiConfig.deepseekEffort,
            thinkingChainEnabled: this._apiConfig.thinkingChainEnabled,
            thinkingChainTag: this._normalizeThinkingTagName(this.thinkingChainTagInput.value),
            opponentName: String(this.charNameInput.value || '').trim(),
            playerName: String(this.userNameInput.value || '').trim(),
          };
          const tx = db.transaction('config', 'readwrite');
          tx.objectStore('config').put(record, 'apiConfig');
        } catch (e) {
          console.warn('[TinyChat] Save config failed', e);
        }
      }

      async _restoreApiConfig() {
        try {
          const db = await this._dbReady;
          const tx = db.transaction('config', 'readonly');
          const req = tx.objectStore('config').get('apiConfig');
          req.onsuccess = () => {
            const r = req.result;
            if (!r) return;
            if (r.url) this.apiUrlInput.value = r.url;
            if (r.key) this.apiKeyInput.value = r.key;
            if (r.model) this.apiModelInput.value = r.model;
            this._apiConfig.url = r.url || '';
            this._apiConfig.key = r.key || '';
            this._apiConfig.model = r.model || '';
            // Restore stream
            this._apiConfig.stream = !!r.stream;
            this._apiConfig.streamMode = r.streamMode || '';
            if (r.stream && r.streamMode) {
              this._setLabelState(this.streamLabel, 'emerald');
              const modeText = r.streamMode === 'realtime' ? '实时传输' : r.streamMode === 'complete' ? '完整传输' : '';
              this.streamInput.value = modeText;
            }
            // Restore deepseek
            this._apiConfig.deepseekThinking = r.deepseekThinking || '';
            this._apiConfig.deepseekEffort = r.deepseekEffort || '';
            this._apiConfig.thinkingChainTag = this._normalizeThinkingTagName(r.thinkingChainTag || '');
            this._apiConfig.thinkingChainEnabled = !!this._apiConfig.thinkingChainTag;
            this.thinkingChainTagInput.value = this._apiConfig.thinkingChainTag;
            this.opponentName = String(r.opponentName || this.opponentName || '赫敏·格兰杰').trim() || '赫敏·格兰杰';
            this.playerName = String(r.playerName || this.playerName || '你').trim() || '你';
            this.charNameInput.value = this.opponentName;
            this.userNameInput.value = this.playerName;
            if (r.deepseekThinking) {
              this._setLabelState(this.deepseekLabel, 'emerald');
              this.deepseekInput.value = r.deepseekThinking === 'enabled' ? '启用' : '禁用';
              if (r.deepseekThinking === 'enabled' && r.deepseekEffort) {
                this.deepseekEffortInput.value = r.deepseekEffort;
                this._setLabelState(this.deepseekEffortLabel, 'emerald');
              }
            }
          };
        } catch (e) {
          console.warn('[TinyChat] Restore config failed', e);
        }
      }
    }

    (function bindTinyChatHostGestures() {
      let rightDragging = false;

      function postHostMessage(payload) {
        try {
          window.parent?.postMessage?.(payload, '*');
        } catch (e) {}
      }

      window.addEventListener('contextmenu', (event) => {
        event.preventDefault();
      });

      window.addEventListener('pointerdown', (event) => {
        if (event.button !== 2) return;
        rightDragging = true;
        event.preventDefault();
        postHostMessage({
          type: 'tinychat.hostRightDragStart',
          pointerId: event.pointerId,
          clientX: event.clientX,
          clientY: event.clientY,
        });
      });

      window.addEventListener('pointermove', (event) => {
        if (!rightDragging) return;
        event.preventDefault();
        postHostMessage({
          type: 'tinychat.hostRightDragMove',
          pointerId: event.pointerId,
          clientX: event.clientX,
          clientY: event.clientY,
        });
      });

      const endRightDrag = (event) => {
        if (!rightDragging) return;
        rightDragging = false;
        event?.preventDefault?.();
        postHostMessage({
          type: 'tinychat.hostRightDragEnd',
          pointerId: event?.pointerId,
        });
      };

      window.addEventListener('pointerup', endRightDrag);
      window.addEventListener('pointercancel', endRightDrag);
      window.addEventListener('blur', () => {
        if (!rightDragging) return;
        rightDragging = false;
        postHostMessage({ type: 'tinychat.hostRightDragEnd' });
      });

      window.addEventListener('wheel', (event) => {
        if (!event.ctrlKey) return;
        event.preventDefault();
        postHostMessage({
          type: 'tinychat.hostWheel',
          deltaY: event.deltaY,
          clientX: event.clientX,
          clientY: event.clientY,
          ctrlKey: event.ctrlKey,
        });
      }, { passive: false });
    })();


    new TinyChat('#tiny-chat-root', {
      opponentName: '赫敏·格兰杰',
      playerName: '你',
    });
  </script>
